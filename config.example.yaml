llm:
  base_url: "http://localhost:1234/v1"
  api_key: "lm-studio"
  model: "local-model-name"
  modelLabel: "local-model-label"
  company: "local-company"
  quantization: "not-specified"
  temperatures:
    - 0.2
    - 0.4
    - 0.6
  # Optional sampling parameters. Omit or leave commented to let the provider
  # (for example LM Studio) use its own defaults.
  top_p: 0.95
  min_p: 0.05
  top_k: 40
  repetition_penalty: 1.0
  seed: 42
  timeout_seconds: 1800
  # Optional API request throttle. Use null or omit to disable.
  # requests_per_minute: 3

benchmark:
  # Solution generator: "llm" calls the OpenAI-compatible API directly;
  # "opencode" runs the same model through OpenCode inside Docker.
  generator: "llm"
  # Optional: choose "easy", "medium", "hard" or "all".
  # Omit or use "all" to run every difficulty.
  difficulty: "all"
  output_dir: "results"
  max_attempts_per_task: 1
  # Runs Docker build/test evaluations in the background while the next task is
  # generated. Increase if the machine can run multiple evaluation containers.
  evaluation_workers: 1
  # Optional: run only one task from the selected difficulty scope.
  # task_id: "easy-001"

opencode:
  # Required when benchmark.generator is "opencode".
  version: "1.16.2"
  package: "opencode-ai"
  docker_image: "csharp-llm-benchmark-opencode"
  cache_dir: ".cache/opencode"
  timeout_seconds: 900
  keep_timed_out_containers: false
  # Prepares the next task workspace/config while the current OpenCode session
  # is running. The LLM session itself remains serial.
  prepare_ahead: true
  # More aggressive: docker-create the next task container during preparation,
  # but only docker-start it after the current OpenCode session finishes.
  precreate_container: false
  max_steps: 80
  network: "bridge"
  # Optional model limits passed to OpenCode so it can track remaining context
  # for OpenAI-compatible/custom providers. Omit when OpenCode can infer them.
  # context_limit: 131072
  # output_limit: 8192
  compaction:
    auto: true
    prune: true
    reserved: 10000
  # Optional endpoint visible from inside the OpenCode container. When omitted,
  # localhost/127.0.0.1 in llm.base_url is translated to host.docker.internal.
  # container_base_url: "http://host.docker.internal:1234/v1"

docker:
  image: "csharp-llm-benchmark-dotnet8"
  timeout_seconds: 60
  memory_limit: "512m"
  cpus: "1.0"
  pids_limit: 200
  network: "none"
  read_only: true
  cap_drop:
    - "ALL"
